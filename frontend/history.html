<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentinel AI | Scan History</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Roboto:wght@400;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="dashboard.css">
    <style>
        .table-container {
            width: 100%;
            overflow-x: auto;
            background: var(--card-bg);
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            text-align: left;
            padding: 1rem;
            border-bottom: 1px solid var(--border-color);
        }

        th {
            background: rgba(255, 255, 255, 0.05);
            color: var(--accent-cyan);
            font-weight: 600;
        }

        tr:hover {
            background: var(--hover-bg);
        }

        .status-safe {
            color: var(--status-safe);
        }

        .status-critical {
            color: var(--status-danger);
        }

        .controls {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
        }

        .search-input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 4px;
        }

        .btn-clear {
            background: rgba(255, 71, 87, 0.1);
            color: var(--status-danger);
            border: 1px solid var(--status-danger);
            padding: 0.5rem 1rem;
            border-radius: 4px;
            cursor: pointer;
        }

        .btn-download {
            background: transparent;
            border: 1px solid var(--accent-cyan);
            color: var(--accent-cyan);
            padding: 0.3rem 0.8rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .btn-download:hover {
            background: rgba(0, 242, 234, 0.1);
        }
    </style>
</head>

<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <i class="fa-solid fa-shield-halved"></i> Sentinel AI
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item"><i class="fa-solid fa-gauge-high"></i> Dashboard</a>
                <a href="history.html" class="nav-item active"><i class="fa-solid fa-clock-rotate-left"></i> Scan
                    History</a>
                <a href="quarantine.html" class="nav-item"><i class="fa-solid fa-box-archive"></i> Quarantine</a>
                <a href="settings.html" class="nav-item"><i class="fa-solid fa-sliders"></i> Settings</a>
            </nav>
            <div class="sidebar-footer">
                <a href="index.html" class="nav-item logout"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <h2>Scan History</h2>
                <div class="user-profile">
                    <span>Admin User</span>
                    <div class="avatar"><i class="fa-solid fa-user"></i></div>
                </div>
            </header>

            <div class="controls">
                <input type="text" id="search-input" class="search-input" placeholder="Search filenames...">
                <button id="clear-btn" class="btn-clear"><i class="fa-solid fa-trash-can"></i> Clear All Logs</button>
            </div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Time</th>
                            <th>Filename</th>
                            <th>Threat Score</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="history-body">
                        <!-- Populated by JS -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <script src="js/state.js"></script>
    <script src="js/navigation.js"></script>
    <script src="js/history.js"></script>
</body>

</html>
