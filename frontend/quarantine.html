<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentinel AI | Quarantine</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Roboto:wght@400;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="dashboard.css">
    <style>
        .quarantine-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .quarantine-card {
            background: var(--card-bg);
            border: 1px solid var(--status-danger);
            border-radius: 12px;
            padding: 1.5rem;
            position: relative;
            overflow: hidden;
        }

        .quarantine-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: var(--status-danger);
        }

        .q-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .q-title {
            font-weight: 600;
            font-size: 1.1rem;
            color: #fff;
        }

        .q-score {
            background: rgba(255, 71, 87, 0.1);
            color: var(--status-danger);
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            font-size: 0.9rem;
            font-weight: 700;
        }

        .q-meta {
            font-size: 0.9rem;
            color: #a0a0a0;
            margin-bottom: 1.5rem;
        }

        .q-actions {
            display: flex;
            gap: 0.5rem;
        }

        .btn-delete {
            flex: 1;
            background: var(--status-danger);
            color: white;
            border: none;
            padding: 0.6rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            transition: opacity 0.2s;
        }

        .btn-false-pos {
            flex: 1;
            background: transparent;
            border: 1px solid var(--status-safe);
            color: var(--status-safe);
            padding: 0.6rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            transition: background 0.2s;
        }

        .btn-delete:hover {
            opacity: 0.9;
        }

        .btn-false-pos:hover {
            background: rgba(0, 255, 157, 0.1);
        }
    </style>
</head>

<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <i class="fa-solid fa-shield-halved"></i> Sentinel AI
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item"><i class="fa-solid fa-gauge-high"></i> Dashboard</a>
                <a href="history.html" class="nav-item"><i class="fa-solid fa-clock-rotate-left"></i> Scan History</a>
                <a href="quarantine.html" class="nav-item active"><i class="fa-solid fa-box-archive"></i> Quarantine</a>
                <a href="settings.html" class="nav-item"><i class="fa-solid fa-sliders"></i> Settings</a>
            </nav>
            <div class="sidebar-footer">
                <a href="index.html" class="nav-item logout"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <h2>Quarantine Zone</h2>
                <div class="user-profile">
                    <span>Admin User</span>
                    <div class="avatar"><i class="fa-solid fa-user"></i></div>
                </div>
            </header>

            <p style="margin-bottom: 2rem; color: #a0a0a0;">Files flagged as <strong>Critical</strong> are isolated
                here.</p>

            <div id="quarantine-container" class="quarantine-grid">
                <!-- Populated by JS -->
            </div>
        </main>
    </div>

    <script src="js/state.js"></script>
    <script src="js/navigation.js"></script>
    <script src="js/quarantine.js"></script>
</body>

</html>
